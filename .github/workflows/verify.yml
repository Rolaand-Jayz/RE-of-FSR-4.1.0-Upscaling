name: verify

on:
  push:
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc shellcheck

      - name: Python syntax check
        run: |
          python -m py_compile scripts/verify.py
          python -m py_compile rebuild/compare_sections.py
          python -m py_compile rebuild/test_blob_lookup.py
          python -m py_compile scripts/validate_claims.py

      - name: Claim honesty guardrail
        run: python scripts/validate_claims.py

      - name: JSON validity (canonical files)
        run: |
          for f in claims.json evidence-manifest.json verification-report.json rebuild/section-comparison.json; do
            python -m json.tool "$f" > /dev/null && echo "  OK: $f"
          done
          find spec/ reports/ -name '*.json' -exec python -c "import json,sys; json.load(open(sys.argv[1])); print('  OK:', sys.argv[1])" {} \;

      - name: Run public verification (make verify-public)
        run: make verify-public

      - name: Dangerous phrase guard
        run: |
          # Fail if overclaim phrases appear as positive claims
          # (negated uses like "not a drop-in replacement" are allowed)
          OVERCLAIM="bit.identical.{0,40}proof"
          hits=$(grep -RniE "actual order|runtime-proven|complete reconstruction|$OVERCLAIM" \
            README.md CURRENT_STATUS.md VALIDATION_STATUS.md docs reports spec rebuild runtime-validation \
            2>/dev/null | grep -viE "not |overstated|removed|no longer|circular|deprecated|historical|was " || true)
          if [ -n "$hits" ]; then
            echo "DANGEROUS PHRASES DETECTED (non-negated):"
            echo "$hits"
            exit 1
          fi

      - name: Collapsed Markdown guard
        run: |
          # Fail if primary .md files have evidence collapsed into 450+ char lines
          hits=$(grep -rn ".\{450,\}" --include='*.md' README.md CURRENT_STATUS.md VALIDATION_STATUS.md REPRODUCING.md VALIDATORS_START_HERE.md rebuild/README.md runtime-validation/README.md 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "COLLAPSED MARKDOWN DETECTED (450+ char lines):"
            echo "$hits"
            exit 1
          fi

      - name: ShellCheck (informational only — not blocking)
        continue-on-error: true
        run: |
          find . -name '*.sh' -not -path './.git/*' -exec shellcheck {} \;

      - name: C capture tool syntax smoke test (best effort)
        continue-on-error: true
        run: |
          for f in tools/ffx_d3d12_capture.c tools/ffx_capture_proxy.c; do
            gcc -fsyntax-only -I/usr/include/w32api -I/usr/include \
              -D_WIN32 -D_WIN64 -D__GNUC__ \
              "$f" 2>/dev/null && echo "  OK: $f (syntax)" \
              || echo "  SKIP: $f (Windows headers unavailable on Linux — best effort only)"
          done
