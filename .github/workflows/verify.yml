name: verify

on:
  push:
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Python syntax check
        run: python -m py_compile scripts/verify.py rebuild/pe_patcher.py
      - name: Documentation honesty guard
        run: python scripts/validate_claims.py
      - name: Run public verification suite
        run: python scripts/verify.py --report verification-report.ci.json
